<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KEG Challenge 360 · Final Results</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --gold-50:#FAEEDA;--gold-100:#FAC775;--gold-200:#EF9F27;--gold-600:#854F0B;--gold-800:#412402;
  --green-50:#EAF3DE;--green-100:#C0DD97;--green-200:#97C459;--green-400:#639922;--green-600:#3B6D11;--green-800:#173404;
  --silver-100:#D3D1C7;--silver-200:#B4B2A9;--silver-800:#2C2C2A;
  --bronze-100:#F0997B;--bronze-200:#D85A30;
  --ink:#0f172a;--muted:#64748b;
  --radius:14px;--shadow:0 2px 10px rgba(23,52,4,.07);
  --page-bg:#F4F8F1;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:var(--page-bg);margin:0;color:var(--green-800);font-size:14px}

.hero{background:linear-gradient(160deg,#1a1410 0%,#3d2e0f 55%,#5c4310 100%);color:#fff;position:relative;overflow:hidden}
.hero-glow{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 70% 90% at 88% 15%,rgba(250,199,117,.22),transparent)}
.hero-inner{position:relative;z-index:2;padding:24px 18px 22px}
.hero-top{display:flex;align-items:center;gap:12px}
.hero-icon{width:46px;height:46px;border-radius:12px;background:rgba(250,199,117,.18);border:1px solid rgba(250,199,117,.3);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.hero-title{font-size:21px;font-weight:900;margin:0;letter-spacing:-.3px;color:var(--gold-50);text-shadow:0 2px 8px rgba(0,0,0,.5)}
.hero-sub{font-size:12px;color:var(--gold-200);font-weight:600;margin-top:3px;text-shadow:0 1px 4px rgba(0,0,0,.5)}
.hero-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(20,15,10,.55);border:1px solid rgba(250,199,117,.4);padding:5px 13px;border-radius:999px;font-size:11.5px;font-weight:700;color:var(--gold-100);margin-top:14px}

@media(min-width:640px){
  .hero-inner{padding:32px 28px 28px}
  .hero-icon{width:54px;height:54px;font-size:26px}
  .hero-title{font-size:27px}
  .hero-sub{font-size:13.5px}
}

.podium-section{padding:16px 16px 0}
.podium-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 16px}
.podium-label{font-size:11.5px;font-weight:700;color:var(--green-600);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;text-align:center}
.podium-row{display:flex;align-items:flex-end;gap:10px;justify-content:center}
.podium-slot{text-align:center;flex:1;max-width:110px}
.podium-medal{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;margin:0 auto 6px;overflow:hidden;background-size:cover;background-position:center;position:relative;border:2px solid var(--gold-100)}
.podium-medal .rank-chip{position:absolute;bottom:-2px;right:-2px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:900;color:#fff;border:1.5px solid #fff}
.podium-bar{border-radius:8px 8px 0 0}
.podium-name{font-size:11px;font-weight:700;margin-top:6px;color:var(--green-800);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.podium-km{font-size:10.5px;color:var(--green-600);font-weight:600}
.p1 .podium-medal{width:48px;height:48px;font-size:17px}
.p1 .podium-bar{height:74px;background:linear-gradient(135deg,var(--gold-100),var(--gold-200))}
.p1 .podium-km{color:var(--gold-600);font-weight:700}
.p2 .podium-medal{width:42px;height:42px;font-size:15px}
.p2 .podium-bar{height:52px;background:linear-gradient(135deg,var(--silver-100),var(--silver-200))}
.p3 .podium-medal{width:38px;height:38px;font-size:13px}
.p3 .podium-bar{height:38px;background:linear-gradient(135deg,var(--bronze-100),var(--bronze-200))}

.stats{padding:12px 16px 0;display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.stat-card{background:var(--green-50);border:1px solid var(--green-100);border-radius:var(--radius);padding:15px;text-align:center}
.stat-card .big{font-size:23px;font-weight:900;color:var(--gold-600)}
.stat-card .lbl{font-size:11px;color:var(--green-600);font-weight:600;margin-top:2px}
@media(min-width:640px){
  .stats{padding:14px 24px 0}
  .stat-card .big{font-size:26px}
}

.summary-strip{margin:12px 16px 0;background:var(--green-50);border:1px solid var(--green-100);border-radius:var(--radius);padding:13px 16px;display:flex;align-items:center;gap:10px}
.summary-strip .ic{font-size:18px;flex-shrink:0}
.summary-strip p{margin:0;font-size:12.5px;color:var(--green-800);font-weight:600;line-height:1.5}
.summary-strip b{color:var(--gold-600)}

.layout{padding:14px 16px 36px}
@media(min-width:640px){.layout{padding:16px 24px 40px}}

.divider{display:flex;align-items:center;gap:10px;margin:18px 0 12px}
.divider svg{flex-shrink:0}
.divider-line{flex:1;height:1px;background:var(--green-100)}
.divider-label{font-size:12px;font-weight:700;color:var(--green-800)}

.search-box{position:relative;margin-bottom:12px}
.search-box input{width:100%;padding:11px 14px 11px 38px;border-radius:11px;border:1px solid var(--green-100);font-size:14px;font-family:inherit;background:#fff;-webkit-appearance:none;color:var(--green-800)}
.search-box input:focus{outline:2px solid var(--green-400);outline-offset:-1px}
.search-box::before{content:"";position:absolute;left:13px;top:50%;transform:translateY(-50%);width:13px;height:13px;border:1.5px solid var(--green-600);border-radius:50%;opacity:.55}
.search-box::after{content:"";position:absolute;left:21px;top:60%;width:6px;height:1.5px;background:var(--green-600);transform:rotate(45deg);opacity:.55}

#riderList{display:flex;flex-direction:column;gap:8px}
.rider-card{background:#fff;border-radius:0 10px 10px 0;border-left:4px solid var(--green-100);padding:11px 13px 11px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 1px 4px rgba(23,52,4,.05)}
.rider-card.is-club{border-left-color:var(--green-400)}
.rider-card.is-raja{background:linear-gradient(135deg,var(--gold-50),rgba(250,199,117,.08));border-left-color:var(--gold-200)}
.rider-card.is-top{background:linear-gradient(135deg,var(--gold-50),rgba(250,199,117,.12));border-left-color:var(--gold-200)}

.rank-badge{width:27px;height:27px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11.5px;flex-shrink:0;background:var(--green-50);color:var(--green-600);border:1px solid var(--green-100)}
.rank-badge.gold{background:linear-gradient(135deg,var(--gold-100),var(--gold-200));color:var(--gold-800);border:none}

.rider-main{flex:1;min-width:0}
.rider-name{font-size:13.5px;font-weight:700;margin:0;color:var(--green-800);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rider-tags{font-size:10.5px;color:var(--green-600);font-weight:600;margin-top:1px}
.rider-tags.gold-text{color:var(--gold-600)}

.rider-km{font-size:14px;font-weight:800;color:var(--green-800);flex-shrink:0;white-space:nowrap}
.rider-km.gold-text{color:var(--gold-800)}

.empty-msg{display:none;text-align:center;color:var(--muted);padding:40px;font-weight:600}
footer{text-align:center;color:var(--green-600);font-size:11px;padding:10px 16px 30px;opacity:.8}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-glow"></div>
  <div class="hero-inner">
    <div class="hero-top">
      <div class="hero-icon">🏆</div>
      <div>
        <h1 class="hero-title">KEG Challenge 360</h1>
        <div class="hero-sub">Final results · June 2026</div>
      </div>
    </div>
    <div class="hero-pill" id="heroPill">✓ Challenge complete</div>
  </div>
</div>

<div class="podium-section">
  <div class="podium-card">
    <div class="podium-label">Top 3 finishers</div>
    <div class="podium-row" id="podiumRow"></div>
  </div>
</div>

<div class="stats" id="statCards"></div>

<div class="summary-strip" id="summaryStrip"></div>

<div class="layout">
  <div class="divider">
    <svg width="18" height="18" viewBox="0 0 18 18"><circle cx="9" cy="9" r="7.5" fill="none" stroke="#854F0B" stroke-width="1.1"/><line x1="9" y1="2" x2="9" y2="16" stroke="#854F0B" stroke-width="0.7"/><line x1="2" y1="9" x2="16" y2="9" stroke="#854F0B" stroke-width="0.7"/><line x1="4" y1="4" x2="14" y2="14" stroke="#854F0B" stroke-width="0.7"/><line x1="14" y1="4" x2="4" y2="14" stroke="#854F0B" stroke-width="0.7"/><circle cx="9" cy="9" r="1.3" fill="#854F0B"/></svg>
    <div class="divider-line"></div>
    <div class="divider-label">Full standings</div>
    <div class="divider-line"></div>
  </div>

  <div class="search-box"><input id="searchInput" type="text" placeholder="Search rider…" oninput="renderList()"></div>

  <div id="riderList"></div>
  <div class="empty-msg" id="emptyMsg">No rider matches that search.</div>
</div>

<footer>KEG Challenge 360 · June Edition · Final results, 30 June 2026</footer>

const CLUB=360,RAJA=1000;
const fmt=n=>n.toLocaleString('en-IN',{minimumFractionDigits:1,maximumFractionDigits:1});
const clubMembers=riders.filter(r=>r.total>=CLUB);
const rajaMembers=riders.filter(r=>r.total>=RAJA);
const totalKm=riders.reduce((s,r)=>s+r.total,0);
const top3=[...riders].sort((a,b)=>b.total-a.total).slice(0,3);

document.documentElement.style.setProperty('--hero-bg-img', 'none');
document.querySelector('.hero').style.backgroundImage = `linear-gradient(160deg,rgba(26,20,16,0.55) 0%,rgba(61,46,15,0.5) 55%,rgba(92,67,16,0.45) 100%), url('${HERO_BG}')`;
document.querySelector('.hero').style.backgroundSize = 'cover';
document.querySelector('.hero').style.backgroundPosition = 'center 35%';

const riderPhotos={'Noby Thomas':AVATAR_NOBY,'Jose Prasanth':AVATAR_JOSE,'Sooraj Ravi':AVATAR_SOORAJ};
const chipColor={1:'#854F0B',2:'#2C2C2A',3:'#993C1D'};
function medalStyle(r,rank){
  const photo=riderPhotos[r.name];
  if(photo) return `style="background-image:url('${photo}')"`;
  const grad=rank===1?'linear-gradient(135deg,var(--gold-100),var(--gold-200))':rank===2?'linear-gradient(135deg,var(--silver-100),var(--silver-200))':'linear-gradient(135deg,var(--bronze-100),var(--bronze-200))';
  return `style="background:${grad}"`;
}
document.getElementById('podiumRow').innerHTML=`
  <div class="podium-slot p2"><div class="podium-medal" ${medalStyle(top3[1],2)}><span class="rank-chip" style="background:${chipColor[2]}">2</span></div><div class="podium-bar"></div><div class="podium-name">${top3[1].name}</div><div class="podium-km">${fmt(top3[1].total)} km</div></div>
  <div class="podium-slot p1"><div class="podium-medal" ${medalStyle(top3[0],1)}><span class="rank-chip" style="background:${chipColor[1]}">1</span></div><div class="podium-bar"></div><div class="podium-name">${top3[0].name}</div><div class="podium-km">${fmt(top3[0].total)} km</div></div>
  <div class="podium-slot p3"><div class="podium-medal" ${medalStyle(top3[2],3)}><span class="rank-chip" style="background:${chipColor[3]}">3</span></div><div class="podium-bar"></div><div class="podium-name">${top3[2].name}</div><div class="podium-km">${fmt(top3[2].total)} km</div></div>`;

  <div class="stat-card"><div class="big">${rajaMembers.length}</div><div class="lbl">Monsoon Raja</div></div>`;

document.getElementById('summaryStrip').innerHTML=`
  <span class="ic">🚴</span>
  <p><b>${riders.length}</b> riders rode <b>${fmt(totalKm)}</b> km together this June — an average of <b>${fmt(totalKm/riders.length)}</b> km each.</p>`;

document.getElementById('heroPill').innerHTML=`✓ ${riders.length} riders · ${fmt(totalKm)} km ridden together`;

function renderList(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  const filtered=riders.filter(r=>r.name.toLowerCase().includes(q));
  document.getElementById('emptyMsg').style.display=filtered.length?'none':'block';

  document.getElementById('riderList').innerHTML=filtered.map(r=>{
    const isRaja=r.total>=RAJA;
    const isClub=r.total>=CLUB;
    const isTop3=r.rank<=3;
    let cardClass='rider-card';
    if(isRaja||isTop3) cardClass+=' is-top';
    else if(isClub) cardClass+=' is-club';

    let tags;
    if(isRaja) tags=`<div class="rider-tags gold-text">👑 Monsoon Raja · 🏆 360 club</div>`;
    else if(isClub) tags=`<div class="rider-tags">🏆 360 club</div>`;
    else if(r.to360<30) tags=`<div class="rider-tags">Just missed the 360 club</div>`;
    else tags=`<div class="rider-tags" style="color:var(--muted)">${fmt(r.to360)} km short of 360</div>`;

    const useGold=isRaja||isTop3;
    const badgeClass=r.rank<=3?'rank-badge gold':'rank-badge';

    return`<div class="${cardClass}">
      <div class="${badgeClass}">${r.rank}</div>
      <div class="rider-main">
        <p class="rider-name">${r.name}</p>
        ${tags}
      </div>
      <div class="rider-km${useGold?' gold-text':''}">${fmt(r.total)} km</div>
    </div>`;
  }).join('');
}
renderList();
