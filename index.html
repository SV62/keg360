<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KEG Challenge 360</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --green-700:#15803d; --green-600:#16a34a; --green-500:#22c55e; --green-50:#ecfdf5; --green-100:#dcfce7;
  --amber-500:#f59e0b; --amber-400:#fbbf24; --amber-50:#fffbeb;
  --orange-500:#f97316; --orange-50:#fff7ed; --orange-100:#ffedd5;
  --red-500:#ef4444; --red-50:#fef2f2; --red-100:#fee2e2;
  --slate-400:#94a3b8; --slate-200:#e2e8f0; --slate-50:#f8fafc;
  --purple-600:#7c3aed;
  --ink:#0f172a; --muted:#64748b; --line:#e5e7eb;
  --radius:16px; --shadow:0 2px 10px rgba(15,23,42,.06);
}
*{box-sizing:border-box}
body{font-family:'Inter',Arial,sans-serif;background:var(--slate-50);margin:0;color:var(--ink)}

/* ---------- HERO ---------- */
.hero{
  background:linear-gradient(135deg,var(--green-700),var(--green-500));
  color:#fff;padding:22px 24px;position:relative;overflow:hidden;
}
.hero-inner{display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap;position:relative;z-index:2}
.hero-left{display:flex;align-items:center;gap:14px}
.hero-icon{width:52px;height:52px;border-radius:14px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.hero-title{font-size:24px;font-weight:800;margin:0;letter-spacing:-.3px}
.hero-sub{display:flex;align-items:center;gap:10px;margin-top:4px;flex-wrap:wrap}
.hero-sub p{margin:0;font-size:13.5px;opacity:.92}
.live-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.2);padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600}
.live-dot{width:7px;height:7px;border-radius:50%;background:#bbf7d0;box-shadow:0 0 0 0 rgba(187,247,208,.7);animation:pulse 1.8s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(187,247,208,.55)}70%{box-shadow:0 0 0 7px rgba(187,247,208,0)}100%{box-shadow:0 0 0 0 rgba(187,247,208,0)}}
.hero-stats{display:flex;gap:10px;flex-wrap:wrap}
.hero-stat{background:rgba(255,255,255,.14);border-radius:12px;padding:8px 16px;min-width:74px;text-align:center}
.hero-stat .ic{font-size:15px}
.hero-stat .n{font-size:18px;font-weight:800;line-height:1.3}
.hero-stat .l{font-size:10.5px;opacity:.88;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.hero-bike{position:absolute;right:6%;top:50%;transform:translateY(-50%);font-size:90px;opacity:.13;z-index:1}

/* ---------- BANNER ---------- */
.banner{background:linear-gradient(135deg,var(--amber-50),#fff7e0);border-bottom:1px solid #fde68a}
.banner-inner{max-width:1280px;margin:0 auto;padding:16px 24px;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px}
.banner-item{display:flex;align-items:flex-start;gap:10px}
.banner-ic{font-size:24px;flex-shrink:0;line-height:1}
.banner-item h4{margin:0;font-size:13.5px;font-weight:700;color:var(--ink)}
.banner-item p{margin:2px 0 0;font-size:12.5px;color:var(--muted)}

/* ---------- STAT CARDS ---------- */
.stats{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;padding:18px 24px 6px}
.stat-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 18px;display:flex;align-items:center;gap:12px}
.stat-card .ic-box{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.stat-card .big{font-size:24px;font-weight:800;line-height:1.15}
.stat-card .lbl{font-size:12px;color:var(--muted);font-weight:600}
.ic-riders{background:var(--green-100);color:var(--green-700)}
.ic-club{background:var(--orange-100);color:var(--orange-500)}
.ic-km{background:#dbeafe;color:#2563eb}
.ic-raja{background:#ede9fe;color:var(--purple-600)}

/* ---------- LAYOUT ---------- */
.layout{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:300px 1fr;gap:18px;padding:14px 24px 40px;align-items:start}
@media(max-width:880px){.layout{grid-template-columns:1fr}}

.panel{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:16px}
.panel + .panel{margin-top:14px}
.panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.panel-head h3{margin:0;font-size:14px;font-weight:800;display:flex;align-items:center;gap:6px}
.panel-head a{font-size:12px;color:var(--green-600);font-weight:700;text-decoration:none;cursor:pointer}
.panel-head a:hover{text-decoration:underline}

.mini-row{display:flex;align-items:center;gap:10px;padding:7px 2px;border-bottom:1px solid #f1f5f9}
.mini-row:last-child{border-bottom:none}
.mini-badge{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;color:#fff}
.mini-name{flex:1;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-val{font-size:12.5px;font-weight:700;flex-shrink:0}

.movers .mini-badge{background:var(--green-600)}
.movers .mini-val{color:#2563eb}
.brink .mini-badge{background:var(--orange-500)}
.brink .mini-val{color:var(--red-500)}
.fame .mini-badge{background:var(--amber-500)}
.fame .mini-name{font-weight:700}

/* ---------- SEARCH + LEGEND ---------- */
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:14px}
.search-box{flex:1;min-width:220px;position:relative}
.search-box input{width:100%;padding:11px 14px 11px 38px;border-radius:12px;border:1px solid var(--slate-200);font-size:13.5px;font-family:inherit;background:#fff}
.search-box input:focus{outline:2px solid var(--green-500);outline-offset:-1px}
.search-box::before{content:"🔍";position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:13px;opacity:.6}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);font-weight:600}
.legend span{display:inline-flex;align-items:center;gap:5px}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block}

/* ---------- RIDER CARDS ---------- */
#riderList{display:flex;flex-direction:column;gap:10px}
.rider-card{border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:14px;border:1px solid transparent}
.rank-badge{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0;background:#fff;color:var(--muted);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.rank-1{background:linear-gradient(135deg,#fde68a,#f59e0b);color:#7c2d12}
.rank-2{background:linear-gradient(135deg,#e5e7eb,#9ca3af);color:#1f2937}
.rank-3{background:linear-gradient(135deg,#fbcfe8,#fb923c);color:#7c2d12}

.rider-main{flex:1;min-width:0}
.rider-name{font-size:15px;font-weight:700;margin:0 0 3px}
.rider-week{font-size:12px;color:#2563eb;font-weight:600;margin:0 0 4px}
.badges{display:flex;gap:8px;flex-wrap:wrap}
.badge{font-size:11.5px;font-weight:700;padding:2px 0}
.badge.raja{color:var(--purple-600)}
.badge.club{color:var(--green-600)}
.badge.target{color:#2563eb}

.rider-right{width:230px;flex-shrink:0;text-align:right}
@media(max-width:600px){.rider-right{width:140px}}
.rider-total{font-size:17px;font-weight:800}
.rider-status{font-size:11.5px;font-weight:700;margin:2px 0 6px}
.bar-track{height:7px;border-radius:99px;background:#e5e7eb;overflow:hidden}
.bar-fill{height:100%;border-radius:99px}
.bar-pct{font-size:10.5px;color:var(--muted);font-weight:700;margin-top:3px;text-align:right}

.tier-raja{background:var(--green-50);border-color:#bbf7d0}
.tier-club{background:var(--green-50);border-color:#bbf7d0}
.tier-brink{background:var(--orange-50);border-color:var(--orange-100)}
.tier-progress{background:var(--red-50);border-color:var(--red-100)}
.tier-start{background:var(--slate-50);border-color:var(--slate-200)}

.tier-raja .rider-status{color:var(--purple-600)}
.tier-club .rider-status{color:var(--green-700)}
.tier-brink .rider-status{color:var(--orange-500)}
.tier-progress .rider-status{color:var(--red-500)}
.tier-start .rider-status{color:var(--slate-400)}

.fill-raja{background:linear-gradient(90deg,var(--green-600),var(--purple-600))}
.fill-club{background:linear-gradient(90deg,var(--green-500),var(--green-600))}
.fill-brink{background:linear-gradient(90deg,var(--amber-400),var(--orange-500))}
.fill-progress{background:linear-gradient(90deg,#fca5a5,var(--red-500))}
.fill-start{background:var(--slate-400)}

.empty-msg{text-align:center;color:var(--muted);font-size:13px;padding:30px 0;display:none}
footer{text-align:center;color:var(--muted);font-size:11.5px;padding:10px 0 26px}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-bike">🚴</div>
  <div class="hero-inner">
    <div class="hero-left">
      <div class="hero-icon">🚴</div>
      <div>
        <h1 class="hero-title">KEG Challenge 360</h1>
        <div class="hero-sub">
          <p>June Challenge Dashboard</p>
          <span class="live-pill"><span class="live-dot"></span>Live Standings</span>
        </div>
      </div>
    </div>
    <div class="hero-stats" id="heroStats"></div>
  </div>
</div>

<div class="banner"><div class="banner-inner" id="bannerInner"></div></div>

<div class="stats" id="statCards"></div>

<div class="layout">
  <div class="sidebar">
    <div class="panel movers">

    </div>
    <div class="panel fame">
      <div class="panel-head"><h3>🏆 360 Club Hall of Fame</h3></div>
      <div id="fameList"></div>
    </div>
  </div>

  <div class="main">
    <div class="panel">
      <div class="toolbar">
        <div class="search-box"><input id="searchInput" type="text" placeholder="Search rider by name..." oninput="renderList()"></div>
        <div class="legend">
          <span><i class="dot" style="background:var(--green-500)"></i>360 Club (Achieved)</span>
          <span><i class="dot" style="background:var(--orange-500)"></i>On the Brink</span>
          <span><i class="dot" style="background:var(--red-500)"></i>Building Distance</span>

      <div id="riderList"></div>
      <div class="empty-msg" id="emptyMsg">No rider matches that search.</div>

</div>

<footer>KEG Challenge 360 · June Edition · Updated 20 June 2026</footer>

  <div class="mini-row"><div class="mini-badge">${i+1}</div><div class="mini-name">${r.name}</div><div class="mini-val">${fmt(r.to360)} km</div></div>`).join('');

document.getElementById('fameList').innerHTML = fameTop5.map((r,i)=>`
  <div class="mini-row"><div class="mini-badge">${i+1}</div><div class="mini-name">${r.name}</div></div>`).join('');

// ---- Main rider list ----
function renderList(){
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const filtered = riders.filter(r=>r.name.toLowerCase().includes(q));
  document.getElementById('emptyMsg').style.display = filtered.length ? 'none' : 'block';

  document.getElementById('riderList').innerHTML = filtered.map(r=>{
    const tier = tierOf(r);
    const pct = Math.min(100, Math.round(r.total/RAJA_TARGET*100));
    const rankClass = r.rank<=3 ? `rank-${r.rank}` : '';
    let statusLine, badgesHtml = '';

    if(tier==='raja'){
      statusLine = 'Monsoon Raja Achieved! 🎉';
      badgesHtml = `<span class="badge raja">👑 Monsoon Raja</span><span class="badge club">🏆 360 Club</span>`;
    } else if(tier==='club'){
      statusLine = `${fmt(r.toRaja)} km to Monsoon Raja`;
      badgesHtml = `<span class="badge club">🏆 360 Club</span>`;
    } else {
      statusLine = `${fmt(r.toRaja)} km to Monsoon Raja`;
      badgesHtml = `<span class="badge target">🎯 ${fmt(r.to360)} km to 360 Club</span>`;
    }

    const weekLine = r.thisWeek>0 ? `✓ +${fmt(r.thisWeek)} km this week` : `– no km logged this week`;

    return `
    <div class="rider-card tier-${tier}">
      <div class="rank-badge ${rankClass}">${r.rank}</div>
      <div class="rider-main">
        <p class="rider-name">${r.name}</p>
        <p class="rider-week">${weekLine}</p>
        <div class="badges">${badgesHtml}</div>
      </div>
      <div class="rider-right">
        <div class="rider-total">${fmt(r.total)} km</div>
        <div class="rider-status">${statusLine}</div>
        <div class="bar-track"><div class="bar-fill fill-${tier}" style="width:${pct}%"></div></div>
        <div class="bar-pct">${pct}%</div>
      </div>
    </div>`;
  }).join('');
}
renderList();
</script>
</body>
</html>
